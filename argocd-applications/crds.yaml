apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-crds
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/ashubambal/student-management-k8s.git
    targetRevision: main
    path: crds

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true